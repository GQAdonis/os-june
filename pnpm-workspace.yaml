# pnpm settings (pnpm 11 no longer reads the "pnpm" field in package.json).

# Dependency build scripts are ignored unless explicitly allowed here.
allowBuilds:
  '@central-icons-react/round-outlined-radius-3-stroke-2': false
  '@central-icons-react/round-filled-radius-3-stroke-2': false
  # validates/provisions the platform binary used by vite and vitest
  esbuild: true
  # postinstall only plays a cosmetic terminal animation
  unicode-animations: false
