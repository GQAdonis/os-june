name: cargo release age

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "scripts/check-cargo-release-age.py"
      - "scripts/cargo-release-age-exclude.txt"
      - ".github/workflows/cargo-release-age.yml"
  # Direct pushes and merges to main re-check against the previous tip
  # (HEAD^), so the cooldown cannot be skipped by bypassing the PR flow.
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "scripts/check-cargo-release-age.py"
      - "scripts/cargo-release-age-exclude.txt"
      - ".github/workflows/cargo-release-age.yml"

permissions:
  contents: read

jobs:
  check:
    name: New crate versions meet 7d cooldown
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Two commits so HEAD^ resolves for push/dispatch runs.
          fetch-depth: 2
      - name: Fetch base ref
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch --depth=1 origin "$BASE_REF"
      # A manifest-only change with a stale (or deleted) Cargo.lock would let
      # later builds resolve fresh crates that never saw the cooldown check,
      # so lockfiles must exist and match their manifests.
      - name: Verify lockfiles are in sync with manifests
        run: |
          set -euo pipefail
          git ls-files '*Cargo.lock' | while read -r lock; do
            cargo metadata --locked --format-version 1 \
              --manifest-path "$(dirname "$lock")/Cargo.toml" > /dev/null
          done
      - name: Check release age of new crate versions
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD^' }}
        run: python3 scripts/check-cargo-release-age.py --base "$BASE_REF"
